name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          set -o pipefail
          npm ci 2>&1 | tee /tmp/install-output.txt

      - name: Build
        id: build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee /tmp/build-output.txt
        continue-on-error: true

      - name: Create issue on build failure
        if: steps.build.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Build Error] ${context.workflow} #${context.runNumber}`,
              body: `## 빌드 실패\n\n**워크플로우:** ${context.workflow}\n**실행:** [#${context.runNumber}](${runUrl})\n**브랜치/Ref:** \`${context.ref}\`\n\n### 출력 로그\n\`\`\`\n${output.slice(-8000)}\n\`\`\``,
              labels: ['bug']
            });

      - name: Annotate build warnings
        if: steps.build.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const installOutput = fs.readFileSync('/tmp/install-output.txt', 'utf8');
            const buildOutput = fs.readFileSync('/tmp/build-output.txt', 'utf8');
            const combinedOutput = installOutput + '\n' + buildOutput;
            const warnings = combinedOutput.split('\n').filter(line =>
              /\bwarning\b|\bwarn\b/i.test(line) &&
              !/^\s*#/.test(line)
            );
            if (warnings.length > 0) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              core.summary
                .addHeading('빌드 경고')
                .addRaw(`**실행:** [#${context.runNumber}](${runUrl})\n`)
                .addCodeBlock(warnings.join('\n'))
                .write();
            }

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          clean-exclude: pr-preview/
